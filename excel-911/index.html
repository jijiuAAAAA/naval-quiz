<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 911｜表格急救站</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;max-width:880px;margin:0 auto;padding:18px;background:#0f172a;color:#e2e8f0}
    .card{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px;margin:12px 0}
    textarea,select,input{width:100%;background:#0b1220;color:#fff;border:1px solid #334155;border-radius:10px;padding:10px}
    textarea{min-height:96px}
    button{background:#6366f1;color:#fff;border:none;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer}
    .btn2{background:#334155}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row>*{flex:1;min-width:220px}
    pre{white-space:pre-wrap;background:#0b1220;border:1px solid #334155;border-radius:10px;padding:10px}
    .muted{color:#94a3b8;font-size:13px}
    .pill{display:inline-block;background:#1e293b;border:1px solid #334155;padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px}
    .ok{color:#86efac}.warn{color:#fbbf24}
  </style>
</head>
<body>
  <h1>Excel 911（v0.2）</h1>
  <p class="muted">输入需求 → 输出公式、说明、诊断建议。先跑通救火场景，再迭代收费能力。</p>

  <div class="card">
    <div class="row">
      <div>
        <label class="muted">快速示例</label>
        <select id="sample"></select>
      </div>
      <div>
        <label class="muted">Excel版本</label>
        <select id="ver">
          <option value="365">Microsoft 365 / 2021+</option>
          <option value="legacy">2016/2019（旧版）</option>
        </select>
      </div>
    </div>
    <br/>
    <textarea id="input" placeholder="例如：按客户去重后汇总金额，并按月份统计"></textarea>
    <br/><br/>
    <div class="row">
      <button id="run">生成方案</button>
      <button id="copy" class="btn2">复制公式</button>
    </div>
  </div>

  <div class="card">
    <span class="pill">模板库：20+</span>
    <span class="pill">错误诊断</span>
    <span class="pill">一键复制</span>
  </div>

  <div class="card">
    <h3>推荐公式</h3>
    <pre id="formula">等待生成...</pre>
    <h3>解释与排错</h3>
    <pre id="explain">等待生成...</pre>
  </div>

  <div class="card">
    <h3>错误诊断向导</h3>
    <div class="row">
      <div>
        <label class="muted">你看到的错误</label>
        <select id="errType">
          <option value="#N/A">#N/A</option>
          <option value="#VALUE!">#VALUE!</option>
          <option value="#REF!">#REF!</option>
          <option value="#NAME?">#NAME?</option>
          <option value="#DIV/0!">#DIV/0!</option>
        </select>
      </div>
      <div>
        <label class="muted">场景</label>
        <input id="scene" placeholder="例如：XLOOKUP查不到客户" />
      </div>
    </div>
    <br/>
    <button id="diag" class="btn2">给我诊断步骤</button>
    <pre id="diagOut">等待诊断...</pre>
  </div>

  <div class="card">
    <h3>收费入口（占位）</h3>
    <p class="muted">免费版：每天3次。<span class="ok">Lite ¥9.9/月</span>（不限次数+20模板）| <span class="warn">Pro ¥29.9/月</span>（批量任务+周报模板）</p>
    <button class="btn2" onclick="alert('支付功能待接入，先验证转化文案')">升级到 Lite</button>
  </div>

<script>
const presets = [
  {n:'按客户去重并汇总金额',k:['去重','汇总','金额'],f365:'=LET(u,UNIQUE(A2:A999),HSTACK(u,MAP(u,LAMBDA(x,SUMIFS(B:B,A:A,x)))))',fLegacy:'=SUMIFS($B:$B,$A:$A,E2)',e:'先UNIQUE提取客户，再SUMIFS汇总金额。旧版需先手工去重。'},
  {n:'按月份统计销售额',k:['月份','统计','销售'],f365:'=SUMIFS(C:C,A:A,">="&DATE(2026,3,1),A:A,"<"&DATE(2026,4,1))',fLegacy:'=SUMPRODUCT((TEXT(A2:A999,"yyyymm")="202603")*C2:C999)',e:'日期列必须是真日期。TEXT法在旧版常用。'},
  {n:'精确查找客户等级',k:['查找','客户','等级'],f365:'=XLOOKUP(E2,A:A,B:B,"未找到")',fLegacy:'=IFERROR(VLOOKUP(E2,$A:$B,2,FALSE),"未找到")',e:'XLOOKUP更稳；VLOOKUP需确保查找列在最左。'},
  {n:'两列合并键值',k:['合并','拼接'],f365:'=A2&"-"&B2',fLegacy:'=A2&"-"&B2',e:'统一键值常用于去重、匹配和透视前处理。'},
  {n:'统计唯一客户数',k:['唯一','客户数'],f365:'=COUNTA(UNIQUE(A2:A999))',fLegacy:'=SUMPRODUCT(1/COUNTIF(A2:A999,A2:A999))',e:'旧版公式可能慢，建议限定数据范围。'},
  {n:'提取手机号后4位',k:['手机号','后4位'],f365:'=RIGHT(A2,4)',fLegacy:'=RIGHT(A2,4)',e:'确认源数据不是科学计数格式。'},
  {n:'文本转日期',k:['文本','日期'],f365:'=DATEVALUE(A2)',fLegacy:'=DATEVALUE(A2)',e:'先检查区域设置与日期格式（yyyy-mm-dd）。'},
  {n:'多条件计数',k:['多条件','计数'],f365:'=COUNTIFS(A:A,"华东",B:B,">=1000")',fLegacy:'=COUNTIFS(A:A,"华东",B:B,">=1000")',e:'COUNTIFS可叠加多个条件。'},
  {n:'多条件求和',k:['多条件','求和'],f365:'=SUMIFS(C:C,A:A,"华东",B:B,">=1000")',fLegacy:'=SUMIFS(C:C,A:A,"华东",B:B,">=1000")',e:'建议范围长度一致，避免隐性错误。'},
  {n:'去掉空格与不可见字符',k:['空格','清洗'],f365:'=TRIM(CLEAN(A2))',fLegacy:'=TRIM(CLEAN(A2))',e:'用于匹配前清洗，显著降低#N/A。'},
  {n:'提取域名',k:['域名','邮箱'],f365:'=TEXTAFTER(A2,"@")',fLegacy:'=MID(A2,FIND("@",A2)+1,99)',e:'用于客户邮箱分组。'},
  {n:'条件标记高风险',k:['标记','风险'],f365:'=IF(B2>100000,"高风险","正常")',fLegacy:'=IF(B2>100000,"高风险","正常")',e:'可配合条件格式高亮。'},
  {n:'排名',k:['排名'],f365:'=RANK.EQ(B2,B:B,0)',fLegacy:'=RANK(B2,B:B,0)',e:'并列名次会重复。'},
  {n:'同比增长率',k:['同比','增长'],f365:'=(B2-C2)/C2',fLegacy:'=(B2-C2)/C2',e:'加IFERROR防分母为0。'},
  {n:'环比增长率',k:['环比'],f365:'=(B2-A2)/A2',fLegacy:'=(B2-A2)/A2',e:'建议格式设为百分比。'},
  {n:'TopN提取',k:['top','前10'],f365:'=TAKE(SORT(A2:C999,3,-1),10)',fLegacy:'=LARGE(C:C,ROW(A1))',e:'365可一条公式搞定排序提取。'},
  {n:'条件去重后求和',k:['条件','去重','求和'],f365:'=SUM(UNIQUE(FILTER(B2:B999,A2:A999="华东")))',fLegacy:'=SUMIFS(B:B,A:A,"华东")',e:'旧版不支持FILTER/UNIQUE时走近似方案。'},
  {n:'拆分姓名和部门',k:['拆分','姓名','部门'],f365:'=TEXTSPLIT(A2,"-")',fLegacy:'=LEFT(A2,FIND("-",A2)-1)',e:'源数据需有统一分隔符。'},
  {n:'工作日天数',k:['工作日','天数'],f365:'=NETWORKDAYS(A2,B2)',fLegacy:'=NETWORKDAYS(A2,B2)',e:'可附加节假日区域。'},
  {n:'重复值标记',k:['重复','标记'],f365:'=IF(COUNTIF(A:A,A2)>1,"重复","")',fLegacy:'=IF(COUNTIF(A:A,A2)>1,"重复","")',e:'配合筛选可快速清理。'},
  {n:'默认模板',k:[],f365:'=IFERROR(你的公式,"请检查范围和数据类型")',fLegacy:'=IFERROR(你的公式,"请检查范围和数据类型")',e:'请补充：数据列、目标结果、Excel版本。'}
];

const errMap = {
  '#N/A':'1) 查找值是否存在\n2) 两边是否有空格(TRIM/CLEAN)\n3) 查找列类型是否一致(文本/数字)\n4) 用IFERROR包裹输出友好提示',
  '#VALUE!':'1) 参数类型不对（文本参与计算）\n2) 日期是否为真实日期\n3) 函数参数个数检查\n4) 逐段拆公式定位错误片段',
  '#REF!':'1) 公式引用列被删除\n2) 复制粘贴导致引用越界\n3) 检查命名区域是否失效\n4) 回滚到上一个可用版本',
  '#NAME?':'1) 函数名拼写错误\n2) 旧版Excel不支持新函数\n3) 文本需加引号\n4) 检查分隔符（逗号/分号）',
  '#DIV/0!':'1) 分母是否为0或空\n2) 用IFERROR或IF(分母=0,"")\n3) 先清洗异常数据再计算'
};

const sampleSel = document.getElementById('sample');
presets.slice(0,20).forEach((p,i)=>{
  const op=document.createElement('option');
  op.value=i;
  op.textContent=p.n;
  sampleSel.appendChild(op);
});

sampleSel.onchange=()=>{ document.getElementById('input').value = presets[sampleSel.value].n; };
sampleSel.dispatchEvent(new Event('change'));

function pick(text){
  const hit = presets.find(p=>p.k.length && p.k.some(k=>text.includes(k)));
  return hit || presets[presets.length-1];
}

let lastFormula = '';
document.getElementById('run').onclick=()=>{
  const t=document.getElementById('input').value.trim();
  const ver=document.getElementById('ver').value;
  const r=pick(t);
  const f = ver==='365'?r.f365:r.fLegacy;
  lastFormula = f;
  document.getElementById('formula').textContent=f;
  document.getElementById('explain').textContent=`场景：${r.n}\n\n说明：${r.e}\n\n验证步骤：\n1) 先用5行样例验证\n2) 再扩大到全量数据\n3) 若结果异常，先查数据格式（数字/文本/日期）`;
};

document.getElementById('copy').onclick=async()=>{
  if(!lastFormula){ alert('先生成公式'); return; }
  await navigator.clipboard.writeText(lastFormula);
  alert('已复制公式');
};

document.getElementById('diag').onclick=()=>{
  const t=document.getElementById('errType').value;
  const s=document.getElementById('scene').value.trim();
  document.getElementById('diagOut').textContent = `错误类型：${t}\n场景：${s||'未填写'}\n\n排查步骤：\n${errMap[t]}\n\n修复后动作：\n- 用样例数据重跑\n- 对比修复前后结果\n- 固化为模板避免重复踩坑`;
};
</script>
</body>
</html>
