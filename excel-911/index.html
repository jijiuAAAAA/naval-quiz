<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 911｜少即是多版</title>
  <style>
    :root{--bg:#0b1020;--card:#111a33;--line:#304262;--text:#e8eeff;--muted:#9db0d9;--brand:#7b8cff}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(160deg,#070b18,#0d1730);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
    h1{font-size:26px;margin:6px 0} p{margin:6px 0}.muted{color:var(--muted);font-size:13px}
    textarea,select{width:100%;background:#0b1328;color:#fff;border:1px solid #304262;border-radius:10px;padding:10px}
    textarea{min-height:88px}
    .row{display:flex;gap:10px}.row>*{flex:1}
    button{border:none;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}
    .main{background:var(--brand);color:#0a1020}.sub{background:#243758;color:#dbe7ff}
    pre{white-space:pre-wrap;background:#0a1225;border:1px solid #2f4367;border-radius:10px;padding:10px;line-height:1.55}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Excel 911</h1>
    <p>一句话描述需求，立即给你可用公式。</p>
    <p class="muted">主路径：输入需求 → 生成公式 → 复制使用</p>
  </div>

  <div class="card">
    <label class="muted">1) 选择示例（可跳过）</label>
    <select id="sample"></select>
    <br/><br/>
    <label class="muted">2) 输入需求</label>
    <textarea id="input" placeholder="例如：按客户去重后汇总金额"></textarea>
    <br/>
    <div class="row">
      <button id="run" class="main">3) 生成公式</button>
      <button id="copy" class="sub">复制公式</button>
    </div>
  </div>

  <div class="card">
    <h3>结果</h3>
    <pre id="formula">等待生成...</pre>
    <p class="muted">建议：先在5行样例上验证，再应用全量数据。</p>
  </div>

  <details class="card">
    <summary>遇到报错？点我看诊断（次要功能）</summary>
    <br/>
    <select id="errType">
      <option value="#N/A">#N/A 查找不到</option>
      <option value="#VALUE!">#VALUE! 类型错误</option>
      <option value="#REF!">#REF! 引用失效</option>
      <option value="#NAME?">#NAME? 函数名错误</option>
    </select>
    <br/><br/>
    <button id="diag" class="sub">生成排查步骤</button>
    <pre id="diagOut">等待诊断...</pre>
  </details>
</div>

<script>
const presets=[
  {n:'按客户去重并汇总金额',k:['去重','汇总','金额'],f:'=LET(u,UNIQUE(A2:A999),HSTACK(u,MAP(u,LAMBDA(x,SUMIFS(B:B,A:A,x)))))'},
  {n:'按月份统计销售额',k:['月份','统计'],f:'=SUMIFS(C:C,A:A,">="&DATE(2026,3,1),A:A,"<"&DATE(2026,4,1))'},
  {n:'精确查找客户等级',k:['查找','等级'],f:'=XLOOKUP(E2,A:A,B:B,"未找到")'},
  {n:'多条件求和',k:['多条件','求和'],f:'=SUMIFS(C:C,A:A,"华东",B:B,">=1000")'},
  {n:'重复值标记',k:['重复','标记'],f:'=IF(COUNTIF(A:A,A2)>1,"重复","")'},
  {n:'默认模板',k:[],f:'=IFERROR(你的公式,"请检查范围和数据类型")'}
];
const errMap={
  '#N/A':'1) 查找值不存在\n2) 数据类型不一致\n3) 先用TRIM清洗空格',
  '#VALUE!':'1) 文本参与了数值计算\n2) 日期不是日期格式\n3) 分段定位错误',
  '#REF!':'1) 引用列被删\n2) 复制时区域越界\n3) 回滚上个版本',
  '#NAME?':'1) 函数拼写错误\n2) 版本不支持\n3) 文本缺引号'
};
const sample=document.getElementById('sample');
presets.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=p.n;sample.appendChild(o)});
sample.onchange=()=>document.getElementById('input').value=presets[sample.value].n;
sample.dispatchEvent(new Event('change'));
let last='';
function pick(t){return presets.find(p=>p.k.length&&p.k.some(k=>t.includes(k)))||presets[presets.length-1]}
document.getElementById('run').onclick=()=>{const t=document.getElementById('input').value.trim();const r=pick(t);last=r.f;document.getElementById('formula').textContent=r.f;}
document.getElementById('copy').onclick=async()=>{if(!last)return alert('先生成公式');await navigator.clipboard.writeText(last);alert('已复制')}
document.getElementById('diag').onclick=()=>{const t=document.getElementById('errType').value;document.getElementById('diagOut').textContent=errMap[t]}
</script>
</body>
</html>
