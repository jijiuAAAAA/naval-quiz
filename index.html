<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>纳瓦尔测评</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #1a1a2e; color: white; min-height: 100vh; }
        .container { background: white; color: #333; padding: 30px; border-radius: 20px; }
        h1 { text-align: center; }
        button { width: 100%; padding: 15px; font-size: 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; cursor: pointer; margin: 10px 0; }
        button:hover { transform: translateY(-2px); }
        .hidden { display: none; }
        .option { padding: 15px; border: 2px solid #ddd; margin: 8px 0; border-radius: 10px; cursor: pointer; }
        .option:hover { border-color: #667eea; background: #f8f9ff; }
        .option.selected { border-color: #667eea; background: #e8ecff; }
    </style>
</head>
<body>
    <div class="container" id="page1">
        <h1>🎯 纳瓦尔人生定位测评</h1>
        <p style="text-align:center;color:#666;margin:20px 0;">"If you don't know what you're doing, someone else will decide it for you."</p>
        <p>通过10道题，找到你天生该走的路</p>
        <button onclick="start()">开始测评</button>
    </div>
    
    <div class="container hidden" id="page2">
        <h2 id="qtitle">第1题</h2>
        <div id="options"></div>
        <button id="nextBtn" onclick="next()" disabled>下一题</button>
    </div>
    
    <div class="container hidden" id="page3">
        <h2 id="resultTitle">结果</h2>
        <p id="resultDesc"></p>
        <button onclick="location.reload()">重新测评</button>
    </div>

    <script>
    var current = 0;
    var answers = [];
    
    var questions = [
        {q:"纳瓦尔说：如果你不知道自己在做什么，别人会替你决定。你的困惑是？",o:["我不知道擅长什么","在做稳定工作但不确定想要什么","有想法但不知道能否成功","想赚钱但不知道做什么"]},
        {q:"\"Escape competition through authenticity\" - 你理解这句话吗？",o:["做真实的自己，不用跟别人比较","找到没人做的细分领域","与其竞争，不如创造新市场","不太理解，想找到不费力的优势"]},
        {q:"什么样的工作让你觉得\"这才是我该做的\"？",o:["创造一些世界上不存在的东西","解决复杂问题带领团队","在某个领域成为顶尖专家","帮助别人解决问题"]},
        {q:"如果你财务自由了，你还会做什么？",o:["继续做现在的事，因为热爱","开始自己的创业项目","投资更多有潜力的项目","去体验不同的人生"]},
        {q:"纳瓦尔说\"和长期的人玩长期游戏\"，你更认同？",o:["找到一个领域，长期深耕","和靠谱的人一起做大事","建立长期有价值的作品","建立深度持久的人际关系"]},
        {q:"你更容易对什么感到焦虑？",o:["在竞争中落后于别人","错过好的投资机会","想法无法落地实现","无法创造有价值的东西"]},
        {q:"纳瓦尔强调\"specific knowledge\"，你最有可能是？",o:["通过多年实践经验积累的技能","对商业和人的直觉判断","独特的创造力和审美","对数字和趋势的敏感"]},
        {q:"你更愿意成为什么样的人？",o:["一个创造者，留下作品","一个专家，在领域内被尊敬","一个企业家，创造就业","一个投资者，聪明配置资源"]},
        {q:"如果有人要你描述自己的核心优势，你会说？",o:["我善于发现机会并整合资源","我善于把复杂事情讲清楚","我有很强的学习能力和好奇心","我善于发现并解决问题"]},
        {q:"最后一道：纳瓦尔说\"Learn to sell, learn to build\"，你最想加强哪个？",o:["构建 - 做出产品/作品","销售 - 链接人和资源","我都需要加强","先构建，再销售"]}
    ];
    
    var types = [
        "创造者","探索者","企业家","投资者",
        "专家","连接者","教育者","服务者"
    ];
    
    function start() {
        document.getElementById('page1').classList.add('hidden');
        document.getElementById('page2').classList.remove('hidden');
        showQ();
    }
    
    function showQ() {
        document.getElementById('qtitle').innerText = '第'+(current+1)+'题';
        var opts = document.getElementById('options');
        opts.innerHTML = '';
        questions[current].o.forEach(function(t,i) {
            var d = document.createElement('div');
            d.className = 'option';
            d.innerText = t;
            d.onclick = function() {
                document.querySelectorAll('.option').forEach(function(x){x.classList.remove('selected')});
                this.classList.add('selected');
                answers[current] = i;
                document.getElementById('nextBtn').disabled = false;
            };
            opts.appendChild(d);
        });
        document.getElementById('nextBtn').innerText = current==9?'查看结果':'下一题';
    }
    
    function next() {
        if (current < 9) {
            current++;
            showQ();
        } else {
            showResult();
        }
    }
    
    function showResult() {
        document.getElementById('page2').classList.add('hidden');
        document.getElementById('page3').classList.remove('hidden');
        var counts = {};
        answers.forEach(function(a){counts[a]=(counts[a]||0)+1});
        var sorted = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]});
        var type = types[sorted[0]%8];
        var descs = {
            "创造者":"你渴望通过创作留下独特影响。你有强烈的创造欲望，渴望通过你的作品在这个世界上留下独特的印记。",
            "探索者":"你热爱体验，相信\"没有白走的路\"。你喜欢探索未知，经历丰富多样的人生体验。",
            "企业家":"你有强烈的掌控欲和创建欲，不满足于执行别人的想法。你喜欢从0到1的过程。",
            "投资者":"你对数字敏感，善于分析，明白\"让钱为你工作\"的道理。你喜欢思考长期收益。",
            "专家":"你崇尚专业主义，相信\"打铁还需自身硬\"。你愿意在一个领域持续深耕。",
            "连接者":"你善于人际交往，喜欢把对的人链接到对的事情上。",
            "教育者":"你有强烈的分享欲和教育欲，看到别人成长会让你感到满足。",
            "服务者":"你有强烈的同理心和助人愿望，看到别人因你的帮助而变好是你最大的满足。"
        };
        document.getElementById('resultTitle').innerText = '你是'+type+'型';
        document.getElementById('resultDesc').innerText = descs[type];
    }
    </script>
</body>
</html>
